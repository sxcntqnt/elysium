# ============================================================
# SCHEMA 4: Queries & Lambda Resolvers
# ============================================================
# Root Query type and the JavaScript lambda resolver implementations
# that replace the TypeScript context activation system:
#
#   activateXContext()    → getActiveContext
#   selectActorContext()  → (internal to getActiveContext lambda)
#   gatherAssignments()   → getAssignments
#   resolveUserState()    → getUserState
#
# Deploy lambda JavaScript via the Dgraph Lambda API after
# applying the schema. The @lambda directive only declares
# the field — the resolver must be deployed separately.
# ============================================================

type Query {
  # ── getActiveContext ──────────────────────────────────────────────────────
  # Replaces activateXContext(userState, contextType, options).
  #
  # Implements selectActorContext() logic internally:
  #   - superAdmin: SUPER_ADMIN or ADMIN actor
  #   - orgChair:   ORG_CHAIR actor, optionally scoped to orgId
  #   - orgStaff:   any ORG_STAFF_TYPES actor, optionally scoped to orgId
  #   - crew:       DRIVER preferred over CONDUCTOR
  #   - operator:   OPERATOR actor
  #   - passenger:  PASSENGER preferred over GUEST
  #   - guest:      GUEST actor
  #
  # Returns null when no matching active actor exists.
  # On null: microservice falls back to passenger context.
  #
  # @param userId      - The user UUID (auth.users.id)
  # @param contextType - The ActorType to activate
  # @param orgId       - Optional org UUID for org-scoped contexts
  getActiveContext(
    userId: String!
    contextType: ActorType!
    orgId: String
  ): ActiveContext @lambda

  # ── getUserState ──────────────────────────────────────────────────────────
  # Full user state resolved at login.
  # Replaces resolveUserState() in userState.server.ts.
  # Returns null when the userId does not exist.
  getUserState(userId: String!): UserState @lambda

  # ── getAssignments ────────────────────────────────────────────────────────
  # All Assignment union members for a specific actor.
  # Replaces gatherAssignments() — handles the StageAssignment
  # operator_id special case internally.
  getAssignments(actorId: String!): [Assignment!]! @lambda
}

# ============================================================
# LAMBDA IMPLEMENTATIONS
# ============================================================
# Deploy with: self.addGraphQLResolvers({ "Query.X": handlerFn })
# The implementations below are JavaScript — paste into your
# Dgraph Lambda deployment bundle.
# ============================================================

# ------------------------------------------------------------
# ORG_STAFF_TYPES helper (shared across resolvers)
# ------------------------------------------------------------
# Mirrors ORG_STAFF_TYPES array in context.template.ts.
# Cannot be stored as an enum value — derived at query time.
#
# ```javascript
# const ORG_STAFF_TYPES = new Set([
#   "GENERAL_MANAGER", "FLEET_MANAGER", "OPERATIONS_MANAGER",
#   "BRANCH_MANAGER", "SECRETARY", "ACCOUNTANT", "ACCOUNTS_CLERK",
#   "AUDITOR", "COMPLIANCE_OFFICER", "ROUTE_SUPERVISOR", "DISPATCHER",
#   "MECHANIC", "FIELD_ATTENDANT", "DATA_CLERK", "CUSTOMER_SUPPORT",
#   "SALES_MANAGER",
# ]);
# const isOrgStaff = (type) => ORG_STAFF_TYPES.has(type);
# ```

# ------------------------------------------------------------
# Permission flattening helper (shared across resolvers)
# ------------------------------------------------------------
# Mirrors the filter + map in activateXContext():
#   permissions = actorCtx.permissions
#     .filter(p => p.effect === "allow")
#     .map(p => p.action)
#
# ```javascript
# function flattenPermissions(perms) {
#   return perms
#     .filter(p => p.effect === "allow")
#     .map(p => p.action);
# }
# ```


# ------------------------------------------------------------
# Lambda registration boilerplate
# ------------------------------------------------------------
# Add to your lambda server entry point:
#
# ```javascript
# self.addGraphQLResolvers({
#   "Query.getActiveContext": getActiveContext,
#   "Query.getUserState":     getUserState,
#   "Query.getAssignments":   getAssignments,
# });
# ```

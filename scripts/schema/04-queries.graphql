# ------------------------------------------------------------
# LAMBDA: getAssignments
# ------------------------------------------------------------
# Replaces gatherAssignments() in context.template.ts.
# Handles the StageAssignment operator_id special case:
#   TS: a.stageAssignments.filter(s => s.operator_id === actorId)
#   Here: actorId field stores operator_id for StageAssignment nodes.
#
# ```javascript
# async function getAssignments({ args, dql }) {
#   const { actorId } = args;
#
#   // All five assignment types fetched in parallel.
#   const [drivers, conductors, fleets, stages, orgs] = await Promise.all([
#     dql.query(`query {
#       queryDriverAssignment(filter: { actorId: { eq: "${actorId}" } }) {
#         id actorId organizationId assignedAt shiftState activeTripId
#         vehicle { id plate }
#       }
#     }`),
#     dql.query(`query {
#       queryConductorAssignment(filter: { actorId: { eq: "${actorId}" } }) {
#         id actorId organizationId assignedAt activeTripId
#         vehicle { id plate }
#       }
#     }`),
#     dql.query(`query {
#       queryFleetOwnership(filter: { actorId: { eq: "${actorId}" } }) {
#         id actorId organizationId assignedAt
#         vehicle { id plate }
#       }
#     }`),
#     // ⚠️  actorId field stores operator_id for StageAssignment.
#     //     Filter is identical — the stored value IS operator_id.
#     dql.query(`query {
#       queryStageAssignment(filter: { actorId: { eq: "${actorId}" } }) {
#         id actorId organizationId assignedAt
#         stage { id name }
#       }
#     }`),
#     dql.query(`query {
#       queryOrgMembership(filter: { actor: { id: "${actorId}" } }) {
#         id orgName role joinedAt
#         org { id name }
#       }
#     }`),
#   ]);
#
#   // Add __typename so Dgraph can resolve the union correctly.
#   return [
#     ...(drivers.data.queryDriverAssignment ?? []).map(d =>
#       ({ ...d, __typename: "DriverAssignment",
#          // Derive conductorShiftState equivalent for display consistency
#       })
#     ),
#     ...(conductors.data.queryConductorAssignment ?? []).map(c => ({
#       ...c,
#       __typename: "ConductorAssignment",
#       // ⚠️  shiftState derived: on_duty if vehicle present, off_duty otherwise.
#       shiftState: c.vehicle ? "on_duty" : "off_duty",
#     })),
#     ...(fleets.data.queryFleetOwnership ?? []).map(f =>
#       ({ ...f, __typename: "FleetOwnership" })
#     ),
#     ...(stages.data.queryStageAssignment ?? []).map(s =>
#       ({ ...s, __typename: "StageAssignment" })
#     ),
#     ...(orgs.data.queryOrgMembership ?? []).map(o =>
#       ({ ...o, __typename: "OrgMembership" })
#     ),
#   ];
# }
# ```

